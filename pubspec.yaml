name: minaret
description: "Minaret | A high-end digital atelier for professional prayer management."
publish_to: "none"
version: 1.0.0+16

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

  # Unified Firebase Stack
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.2
  cloud_functions: ^5.1.4
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.0
  firebase_analytics: ^11.3.3
  firebase_performance: ^0.10.1+10
  firebase_app_check: ^0.3.1+1
  firebase_remote_config: ^5.3.0

  # State Management & Storage
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications & Timezones
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

  # Location
  geolocator: ^13.0.4
  geocoding: ^3.0.0
  web: ^1.1.0 # ← add this

  # Ads
  google_mobile_ads: ^5.3.1

  # Calculation & Networking
  adhan: ^2.0.0+1
  http: ^1.2.1
  hijri: ^3.0.0
  connectivity_plus: ^6.1.3
  flutter_secure_storage: ^9.2.2

  # UI & Media Tools
  google_fonts: ^6.2.1
  image_picker: ^1.2.2
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  cached_network_image: ^3.4.1

  # Audio Engine for Hadith Playback
  just_audio: ^0.9.46
  flutter_screenutil: ^5.9.3

  # On-Device Document Verification
  google_mlkit_text_recognition: ^0.13.1
  string_similarity: ^2.2.0
  path_provider: ^2.1.5

  # Social Sign-In
  google_sign_in: ^6.2.2

  # Hashing
  crypto: ^3.0.7

  # Deep links
  app_links: ^6.4.1

  # Background Downloading
  dio: ^5.9.2

  # Environment Variables
  flutter_dotenv: ^5.1.0

  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.jpeg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_logo.jpeg"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/app_logo.jpeg"
  android_12:
    color: "#FFFFFF"
    image: "assets/images/app_logo.jpeg"

dependency_overrides:
  flutter_compass_v2: 1.0.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/sounds/
